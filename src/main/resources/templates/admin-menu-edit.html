<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Item - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Shared Admin CSS */
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }

        .edit-container { flex: 1; display: flex; justify-content: center; padding: 40px 20px; }

        .edit-card {
            background: white; padding: 40px; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px;
            border-top: 5px solid #ffc107;
        }

        h2 { margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 15px; font-family: 'Oswald', sans-serif; }

        label { display: block; margin-top: 15px; font-weight: bold; color: #555; font-size: 0.9rem; }

        input, select, textarea {
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc;
            border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem;
        }
        input:focus, select:focus { border-color: #ffc107; outline: none; }

        /* Pricing Section */
        .pricing-section { background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 15px; border: 1px solid #eee; }
        .pricing-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .pricing-row:last-child { margin-bottom: 0; }

        /* Buttons */
        .btn-group { margin-top: 30px; display: flex; gap: 15px; }

        .btn-save {
            flex: 2; background: #28a745; color: white; border: none;
            padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
            font-size: 1rem; transition: 0.3s;
        }
        .btn-save:hover { background: #218838; transform: translateY(-2px); }

        .btn-cancel {
            flex: 1; background: #6c757d; color: white; text-decoration: none;
            padding: 15px; border-radius: 8px; text-align: center; font-weight: bold;
            font-size: 1rem; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .btn-cancel:hover { background: #5a6268; }

        @media (max-width: 600px) {
            .edit-card { padding: 20px; }
            .btn-group { flex-direction: column; }
            .pricing-row { flex-direction: column; gap: 5px; margin-bottom: 15px; border-bottom:1px solid #ddd; padding-bottom:10px; }
        }
    </style>
</head>
<body>

<div th:replace="~{admin-navbar :: nav(activePage='menu')}"></div>

<div class="edit-container">
    <div class="edit-card">
        <h2>✏️ Edit Item Details</h2>

        <form th:action="@{/admin/menu/add}" th:object="${pizza}" method="post">

            <input type="hidden" th:field="*{id}">

            <label>Item Name</label>
            <input type="text" th:field="*{name}" required>

            <label>Description</label>
            <input type="text" th:field="*{description}">

            <label>Image URL</label>
            <input type="text" th:field="*{imageUrl}">

            <label>Category</label>
            <select th:field="*{category}">
                <option value="Pizza">Pizza</option>
                <option value="Side">Side</option>
                <option value="Drink">Drink</option>
            </select>

            <div style="margin-top: 15px; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" name="isVeg" id="vegCheck" style="width: auto; height: 20px; width: 20px;"
                       th:checked="${pizza.veg}">
                <label for="vegCheck" style="margin: 0; color: #28a745; cursor:pointer;">Is Vegetarian? 🌱</label>
            </div>

            <label>Pricing Options (Size & Price)</label>
            <div class="pricing-section">
                <p style="font-size:0.8rem; color:#666; margin-top:0;">Modify existing prices or add new sizes below.</p>

                <div class="pricing-row" th:each="entry : *{sizes}">
                    <input type="text" name="sizeNames" th:value="${entry.key}" placeholder="Size Name" required>
                    <input type="number" step="0.01" name="sizeValues" th:value="${entry.value}" placeholder="Price (₹)" required>
                </div>

                <div class="pricing-row">
                    <input type="text" name="sizeNames" placeholder="Add New Size (e.g. XL)">
                    <input type="number" step="0.01" name="sizeValues" placeholder="Price (₹)">
                </div>
            </div>

            <div class="btn-group">
                <a href="/admin/menu" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-save">Save Changes</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
