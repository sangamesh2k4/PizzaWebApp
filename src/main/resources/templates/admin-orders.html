<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center - Orders</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Shared CSS */
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; margin: 0; padding-bottom: 40px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        h1 { border-left: 5px solid #28a745; padding-left: 15px; color: #333; margin-bottom: 25px; font-family: 'Oswald', sans-serif; }

        /* Table Styles */
        .table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: #343a40; color: white; padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #eee; color: #555; vertical-align: middle; }
        tr:hover { background-color: #f8f9fa; }

        /* Badges & Inputs */
        .badge { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; display: inline-block; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; background: #fff; cursor: pointer; font-family: 'Poppins', sans-serif; }
        .btn-update { background: #343a40; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-left: 5px; transition: 0.2s; }
        .btn-update:hover { background: #28a745; }

        /* --- MOBILE RESPONSIVE TABLE (Card View) --- */
        @media (max-width: 900px) {
            /* Force table elements to behave like blocks */
            table, thead, tbody, th, td, tr { display: block; }

            /* Hide table headers */
            thead tr { position: absolute; top: -9999px; left: -9999px; }

            tr {
                margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px;
                background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 15px;
            }

            td {
                border: none; border-bottom: 1px solid #eee; position: relative;
                padding-left: 40%; text-align: right;
                display: flex; justify-content: space-between; align-items: center;
            }

            td:last-child { border-bottom: none; justify-content: flex-end; padding-top: 15px; }

            /* Add labels before data */
            td:before {
                content: attr(data-label);
                font-weight: 700; color: #333; text-transform: uppercase; font-size: 0.8rem;
            }

            .btn-update { width: 100%; margin-top: 10px; margin-left: 0; padding: 12px; }
            select { width: 100%; margin-bottom: 5px; }
            form { width: 100%; display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>

<div th:replace="~{admin-navbar :: nav(activePage='orders')}"></div>

<div class="container">
    <h1>📦 Order Management</h1>

    <div class="table-wrapper">
        <table>
            <thead>
            <tr>
                <th>Date</th>
                <th>Customer</th>
                <th>Items</th>
                <th>Total</th>
                <th>Status</th>
                <th>Update Action</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td data-label="Date" th:text="${#dates.format(order.orderDate, 'dd-MMM HH:mm')}">Date</td>

                <td data-label="Customer">
                    <strong th:text="${order.customerName}" style="display:block; color:#333;">Name</strong>
                    <span th:text="${order.address}" style="font-size:0.85rem; color:#888;">Address</span>
                </td>

                <td data-label="Items">
                    <div th:each="item : ${order.items}" th:text="'• ' + ${item}" style="font-size:0.9rem;"></div>
                </td>

                <td data-label="Total" style="font-weight:bold; color:#28a745;">₹ <span th:text="${order.totalAmount}"></span></td>

                <td data-label="Status">
                    <span th:text="${order.status}" class="badge"
                          th:styleappend="${order.status == 'PLACED' ? 'background:#fff3cd; color:#856404;' :
                          (order.status == 'COOKING' ? 'background:#cce5ff; color:#004085;' :
                          (order.status == 'DELIVERED' ? 'background:#d4edda; color:#155724;' : 'background:#f8d7da; color:#721c24;'))}">
                    </span>
                </td>

                <td data-label="Action">
                    <form th:action="@{/admin/order/update}" method="post">
                        <input type="hidden" name="orderId" th:value="${order.id}">
                        <select name="status">
                            <option value="PLACED" th:selected="${order.status == 'PLACED'}">Placed</option>
                            <option value="COOKING" th:selected="${order.status == 'COOKING'}">Cooking</option>
                            <option value="OUT_FOR_DELIVERY" th:selected="${order.status == 'OUT_FOR_DELIVERY'}">Out for Delivery</option>
                            <option value="DELIVERED" th:selected="${order.status == 'DELIVERED'}">Delivered</option>
                            <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">Cancelled</option>
                        </select>
                        <button type="submit" class="btn-update">Update</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
