<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Access Denied</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-neutral: #F4F1ED;
            --brand-tomato: #C0392B;
            --brand-dark: #2C3E50;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-neutral);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
            width: 90%;
            border-top: 6px solid var(--brand-tomato);
        }

        .error-icon {
            font-size: 4.5rem;
            margin-bottom: 15px;
            /* Applying a subtle animation to the emoji */
            display: inline-block;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            color: var(--brand-dark);
        }

        p {
            color: #666;
            margin-bottom: 35px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .back-btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            background: var(--brand-dark); /* Using dark instead of tomato to make it feel less like a "checkout" action */
            color: white;
            text-align: center;
            padding: 16px;
            border-radius: 15px;
            font-weight: 700;
            text-decoration: none;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(44, 62, 80, 0.2);
        }

        .back-btn:hover {
            transform: translateY(-3px);
            background: #1a252f;
        }
    </style>
</head>
<body>

<div class="error-card">
    <div class="error-icon">🚫</div>
    <h1>Unauthorized Access</h1>
    <p>You do not have permission to view this page. If you are a seller or admin, please ensure you are logged in with the correct credentials.</p>

    <a href="/home" class="back-btn">
        <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Back To Home
    </a>
</div>

</body>
</html>
