<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Coupon - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; margin: 0; }

        .container { max-width: 600px; margin: 50px auto; padding: 0 20px; }

        .card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 5px solid #e83e8c;
        }

        h2 { margin-top: 0; color: #333; font-family: 'Oswald', sans-serif; margin-bottom: 25px; }

        label { display: block; margin-top: 15px; font-weight: bold; color: #555; font-size: 0.9rem; }

        input {
            width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd;
            border-radius: 6px; box-sizing: border-box; font-family: inherit; font-size: 1rem;
        }
        input:focus { border-color: #e83e8c; outline: none; }

        .btn-group { margin-top: 30px; display: flex; gap: 15px; }

        .btn-save {
            flex: 2; background: #e83e8c; color: white; border: none;
            padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
            font-size: 1rem; transition: 0.2s;
        }
        .btn-save:hover { background: #d63384; transform: translateY(-2px); }

        .btn-cancel {
            flex: 1; background: #6c757d; color: white; text-decoration: none;
            padding: 15px; border-radius: 8px; text-align: center; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-cancel:hover { background: #5a6268; }
    </style>
</head>
<body>

<div th:replace="~{admin-navbar :: nav(activePage='coupons')}"></div>

<div class="container">
    <div class="card">
        <h2>🎟️ Create New Coupon</h2>

        <form th:action="@{/admin/coupons/add}" method="post">

            <label>Coupon Code</label>
            <input type="text" name="code" placeholder="e.g. SUMMER50" required style="text-transform: uppercase;">
            <small style="color: #888;">Codes are case-insensitive but stored in uppercase.</small>

            <label>Discount Percentage (%)</label>
            <input type="number" name="discount" placeholder="e.g. 20" min="1" max="100" required>

            <label>Minimum Order Amount (₹)</label>
            <input type="number" name="minOrder" placeholder="e.g. 500" min="0" value="0">
            <small style="color: #888;">Leave as 0 for no minimum requirement.</small>

            <div class="btn-group">
                <a th:href="@{/admin/coupons}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-save">Save Coupon</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
