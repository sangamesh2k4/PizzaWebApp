<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Center - Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Shared CSS */
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; margin: 0; padding-bottom: 40px; }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        h1 { border-left: 5px solid #6f42c1; padding-left: 15px; color: #333; font-family: 'Oswald', sans-serif; }

        /* Add Form Card */
        .add-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        input:focus, select:focus { border-color: #6f42c1; outline: none; }

        /* Size & Price Section */
        .size-price-container { grid-column: span 2; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #eee; }
        .size-row { display: flex; gap: 10px; }

        /* Veg Toggle */
        .toggle-container { display: flex; align-items: center; gap: 10px; padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 6px; }
        .veg-label { font-weight: bold; color: #28a745; cursor: pointer; }

        .btn-add { background: #28a745; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; transition: 0.2s; }
        .btn-add:hover { background: #218838; }

        /* Table Styles */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: #343a40; color: white; padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; color: #555; }

        /* Actions */
        .btn-action { text-decoration: none; padding: 6px 12px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; margin-right: 5px; display: inline-block; }
        .btn-edit { background: #17a2b8; color: white; }
        .btn-toggle { min-width: 70px; text-align: center; }
        .row-disabled { opacity: 0.6; background: #fafafa; }

        .badge-veg { background: #e7f4e4; color: #28a745; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; border: 1px solid #28a745; }
        .badge-nonveg { background: #fdecea; color: #dc3545; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; border: 1px solid #dc3545; }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 900px) {
            .form-grid { grid-template-columns: 1fr; }
            .size-price-container { grid-column: span 1; }

            /* Table to Card View */
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }

            tr { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 12px; background: white; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

            td { border: none; border-bottom: 1px solid #eee; position: relative; padding-left: 40%; text-align: right; display: flex; justify-content: space-between; align-items: center; }
            td:last-child { border-bottom: none; justify-content: flex-end; padding-top: 15px; }

            td:before { content: attr(data-label); font-weight: 700; color: #333; text-transform: uppercase; font-size: 0.8rem; }

            .btn-action { width: 100%; text-align: center; margin-bottom: 5px; }
        }
    </style>
</head>
<body>

<div th:replace="~{admin-navbar :: nav(activePage='menu')}"></div>

<div class="container">
    <h1>🍕 Menu Catalog</h1>

    <div class="add-card">
        <h3 style="margin-top:0; border-bottom: 1px solid #eee; padding-bottom: 10px;">Add New Item</h3>
        <form th:action="@{/admin/menu/add}" th:object="${newPizza}" method="post">
            <div class="form-grid">
                <input type="text" th:field="*{name}" placeholder="Item Name (e.g. Margherita)" required>

                <select th:field="*{category}">
                    <option value="Pizza">Pizza</option>
                    <option value="Side">Side</option>
                    <option value="Drink">Drink</option>
                </select>

                <input type="text" th:field="*{imageUrl}" placeholder="Image URL">

                <div class="toggle-container">
                    <input type="checkbox" name="isVeg" id="isVegCheck" value="true" checked style="width: auto; margin:0;">
                    <label for="isVegCheck" class="veg-label">🌱 Vegetarian</label>
                </div>

                <input type="text" th:field="*{description}" placeholder="Description" style="grid-column: 1 / -1;">

                <div class="size-price-container">
                    <label style="font-weight: bold; font-size: 0.9rem; margin-bottom: 5px; display:block;">Set Prices for Sizes:</label>

                    <div class="size-row">
                        <input type="text" name="sizeNames" placeholder="Size (e.g. Small)" required>
                        <input type="number" step="0.01" name="sizeValues" placeholder="₹ Price" required>
                    </div>
                    <div class="size-row">
                        <input type="text" name="sizeNames" placeholder="Size (e.g. Medium)">
                        <input type="number" step="0.01" name="sizeValues" placeholder="₹ Price">
                    </div>
                    <div class="size-row">
                        <input type="text" name="sizeNames" placeholder="Size (e.g. Large)">
                        <input type="number" step="0.01" name="sizeValues" placeholder="₹ Price">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-add"><i class="fas fa-plus-circle"></i> Add to Menu</button>
        </form>
    </div>

    <table>
        <thead>
        <tr>
            <th>Preview</th>
            <th>Name & Type</th>
            <th>Category</th>
            <th>Base Price</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${pizzas}" th:classappend="${!item.available} ? 'row-disabled'">
            <td data-label="Preview"><img th:src="${item.imageUrl}" style="width:50px; height:50px; border-radius:8px; object-fit:cover;"></td>
            <td data-label="Name">
                <span th:text="${item.name}" style="font-weight:bold; display: block; color:#333;">Name</span>
                <span th:if="${item.veg}" class="badge-veg">VEG</span>
                <span th:unless="${item.veg}" class="badge-nonveg">NON-VEG</span>
            </td>
            <td data-label="Category" th:text="${item.category}">Cat</td>
            <td data-label="Price" th:text="'₹ ' + ${item.price}" style="font-weight:700; color:#28a745;">Price</td>
            <td data-label="Status">
                <span th:if="${item.available}" style="color:#28a745; font-weight:bold;"><i class="fas fa-check-circle"></i> Active</span>
                <span th:unless="${item.available}" style="color:#dc3545; font-weight:bold;"><i class="fas fa-ban"></i> Disabled</span>
            </td>
            <td data-label="Actions">
                <a th:href="@{/admin/menu/edit/{id}(id=${item.id})}" class="btn-action btn-edit">Edit</a>

                <a th:if="${item.available}" th:href="@{/admin/menu/disable/{id}(id=${item.id})}" class="btn-action btn-toggle" style="background:#dc3545; color:white;">Disable</a>

                <a th:unless="${item.available}" th:href="@{/admin/menu/enable/{id}(id=${item.id})}" class="btn-action btn-toggle" style="background:#28a745; color:white;">Enable</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
