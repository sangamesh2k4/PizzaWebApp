<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupons - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Oswald:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Shared Admin CSS */
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; margin: 0; padding-bottom: 40px; }

        .container { max-width: 1000px; margin: 30px auto; padding: 0 20px; }
        h1 { border-left: 5px solid #e83e8c; padding-left: 15px; color: #333; font-family: 'Oswald', sans-serif; margin-bottom: 25px; }

        /* Creation Button Area */
        .header-actions { display: flex; justify-content: flex-end; margin-bottom: 20px; }
        .btn-create {
            background: #e83e8c; color: white; border: none; padding: 12px 25px;
            border-radius: 6px; font-weight: bold; cursor: pointer; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .btn-create:hover { background: #d63384; transform: translateY(-2px); }

        /* Table Styles */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        th { background: #343a40; color: white; padding: 15px; text-align: left; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #eee; color: #555; vertical-align: middle; }
        tr:hover { background-color: #f8f9fa; }

        .code-badge {
            background: #fce4ec; color: #c2185b; padding: 6px 12px; border-radius: 4px;
            font-family: monospace; font-size: 1rem; font-weight: bold; letter-spacing: 1px; border: 1px solid #f8bbd0;
        }

        .btn-delete {
            color: #dc3545; background: #fff5f5; padding: 6px 12px; border-radius: 4px;
            text-decoration: none; font-size: 0.85rem; font-weight: bold; transition: 0.2s; display: inline-block;
        }
        .btn-delete:hover { background: #dc3545; color: white; }

        /* --- MOBILE RESPONSIVE --- */
        @media (max-width: 900px) {
            .btn-create { width: 100%; justify-content: center; }

            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { margin-bottom: 15px; border: 1px solid #ddd; border-radius: 12px; background: white; padding: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
            td {
                border: none; border-bottom: 1px solid #eee; position: relative;
                padding-left: 0; padding-top: 10px; padding-bottom: 10px;
                display: flex; justify-content: space-between; align-items: center;
            }
            td:last-child { border-bottom: none; justify-content: flex-end; }
            td:before {
                content: attr(data-label); font-weight: 700; color: #888; font-size: 0.8rem; text-transform: uppercase;
            }
        }
    </style>
</head>
<body>

<div th:replace="~{admin-navbar :: nav(activePage='coupons')}"></div>

<div class="container">
    <h1>🎟️ Coupon Manager</h1>

    <div class="header-actions">
        <a th:href="@{/admin/coupons/add}" class="btn-create">
            <i class="fas fa-plus"></i> Create New Coupon
        </a>
    </div>

    <table>
        <thead>
        <tr>
            <th>Code</th>
            <th>Discount</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="coupon : ${coupons}">
            <td data-label="Code">
                <span class="code-badge" th:text="${coupon.code}">SUMMER50</span>
            </td>

            <td data-label="Discount" style="font-weight:bold; color:#28a745;" th:text="${coupon.discountPercent} + '%'">
                10%
            </td>

            <td data-label="Status">
                <span style="color:#28a745; font-weight:bold; background:#e8f5e9; padding:4px 8px; border-radius:4px; font-size:0.8rem;">
                    Active
                </span>
            </td>

            <td data-label="Action">
                <a th:href="@{/admin/coupons/delete/{id}(id=${coupon.id})}"
                   class="btn-delete"
                   onclick="return confirm('Are you sure you want to delete this coupon?');">
                    <i class="fas fa-trash"></i> Delete
                </a>
            </td>
        </tr>

        <tr th:if="${coupons == null or coupons.empty}">
            <td colspan="4" style="text-align:center; padding:30px; color:#888;">
                No coupons active. Create one above!
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
